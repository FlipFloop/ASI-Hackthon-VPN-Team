<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><title>Reroute viewer (reference)</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
 body{margin:0;background:#0c1118;color:#e7eef6;font:14px -apple-system,Segoe UI,Roboto,sans-serif}
 #map{height:78vh} .bar{display:flex;gap:18px;align-items:center;padding:12px 16px;flex-wrap:wrap}
 .stat b{color:#39d98a;font-variant-numeric:tabular-nums} .stat{color:#8aa0b8}
 input[type=range]{accent-color:#39d98a}
</style></head>
<body>
<div class="bar">
  <b>Reroute viewer</b>
  <span class="stat">no-fly size <input type="range" id="half" min="1" max="6" step="0.5" value="3"></span>
  <span class="stat" id="info">loading…</span>
</div>
<div id="map"></div>
<script>
const map=L.map('map',{attributionControl:false}).setView([39,-98],4);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:10}).addTo(map);
let layer=L.layerGroup().addTo(map);

// === THE ONLY PART THAT MATTERS FOR INTEGRATION =========================
// Given a reroute() result `out`, render its GeoJSON. Styles come from each
// feature's properties.role (original | reroute | no_fly).
function draw(out){
  layer.clearLayers();
  const gj=L.geoJSON(out.geojson,{
    style:f=>({
      original:{color:'#7a8aa0',weight:2,dashArray:'5,6'},
      reroute :{color:'#39d98a',weight:4},
      no_fly  :{color:'#ff5470',weight:1,fillColor:'#ff5470',fillOpacity:.25},
    }[f.properties.role])
  }).addTo(layer);
  map.fitBounds(gj.getBounds().pad(0.2));
}
// ========================================================================

async function load(){
  const out=await(await fetch('/api/reroute?half='+document.getElementById('half').value)).json();
  draw(out);
  document.getElementById('info').innerHTML=
    `${out.flight.fn} ${out.flight.orig}→${out.flight.dest} · ${out.note} · `+
    `<b>+${out.reroute.extra_nm} nm</b> · <b>+$${out.cost.extra_fuel_usd}</b> fuel · `+
    `<b>+${out.cost.extra_co2_kg} kg CO₂</b> @ $${out.cost.fuel_price_usd_gal}/gal`;
}
document.getElementById('half').onchange=load;
load();
</script>
</body>
</html>
